syntax = "proto3";

package f1rc;

// Commands
message GetVersionCommand {

}
message EchoCommand {
    uint32 echoed_number = 1;
}
message Command {
    oneof command {
        GetVersionCommand get_version = 1;
        EchoCommand echo = 2;
    }
}

// Responses

message GetVersionResponse {
    uint32 major = 1;
    uint32 minor = 2;
    uint32 patch = 3;
}

message Response {
    oneof response {
        GetVersionResponse get_version = 2;
    }
}